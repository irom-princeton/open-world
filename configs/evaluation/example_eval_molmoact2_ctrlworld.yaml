world_model:
  name: ctrlworld
  checkpoint_path: checkpoints/wm/ctrlworld/checkpoint-10000.pt
  params:
    svd_model_path: external/stable-video-diffusion-img2vid
    clip_model_path: external/clip-vit-base-patch32
    debug: false
    debug_log_limit: 3
    num_frames: 5
    num_history: 6
    action_dim: 7
    action_downsample: 3
    width: 320
    height: 192
    num_inference_steps: 50
    decode_to_rgb: true

policy:
  name: molmoact2
  # In-process load (same shape as OpenPI's example config). `checkpoint_path`
  # can be a HF repo id (snapshot_download is called) or a local snapshot dir.
  #
  # Alternative: leave `checkpoint_path` unset and set
  # `policy.params.server_url: http://host:port` to talk to a running
  # `external/molmoact2/examples/droid/host_server_droid.py` instead.
  checkpoint_path: allenai/MolmoAct2-DROID
  params:
    dtype: bfloat16
    device: cuda
    norm_tag: franka_droid
    action_mode: continuous
    num_steps: 10
    # DROID checkpoint takes a SINGLE exterior view + wrist. Pick which named
    # view in your dataset to send as external_cam.
    exterior_view_name: exterior_left
    wrist_view_name: wrist
    stacked_view_order: [exterior_left, exterior_right, wrist]
    enable_depth_reasoning: false
    normalize_language: true
    enable_cuda_graph: false
    joint_position_dim: 7
    debug: false
    debug_log_limit: 3

reward_model:
  name: dummy
  params: {}

scheduler:
  chunk_size: 10

duration: 20
action_hz: 15
video_dir: outputs/irom_test_carrot_molmoact2_ctrlworld_videos
dataset_path: data/benchmark/irom_test_carrot
