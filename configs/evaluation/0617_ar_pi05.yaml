# Policy eval on the 0617_generated benchmark: pi0.5 (pi05_droid) under the
# autoregressive Wan "slow" student (studentinit_aligned @ 40k, many-step sampler).
# Driven by the ARWanWorldModel closed-loop adapter (openworld/world_models/ar_world_model.py).
world_model:
  name: ar_wan
  checkpoint_path: checkpoints/ar_wm/ar_wan_studentinit_aligned/checkpoint-40000.pt
  params:
    config_path: configs/training/ar_wan_studentinit_droid_aligned.py
    stats_root: data/droid_ar_latents
    vae_dir: external/Wan2.1-T2V-1.3B-Diffusers
    num_inference_steps: 32          # "slow" student: many-step flow matching (pre-distill)
    num_cams: 3
    width: 320
    height: 192
    view_order: [exterior_right, exterior_left, wrist]
    debug: true
    debug_log_limit: 4
policy:
  name: openpi
  checkpoint_path: /scratch/gpfs/AM43/yy4041/.cache/openpi/openpi-assets/checkpoints/pi05_droid
  params:
    config_name: pi05_droid
    repo_path: external/openpi
    pytorch_device: cuda
    debug: false
    debug_log_limit: 3
    exterior_view_name: exterior_left
    wrist_view_name: wrist
    stacked_view_order:
    - exterior_right
    - exterior_left
    - wrist
    resize_height: 224
    resize_width: 224
    joint_position_dim: 7
    action_adapter_checkpoint_path: checkpoints/action_adapter/model2_15_9.pth
    action_adapter_gripper_max: 0.75
    intermediate_resize_height: 180
    policy_skip_step: 2
    num_action_steps: 5
reward_model:
  name: dummy
  params: {}
scheduler:
  chunk_size: 8
duration: 25
action_hz: 5
dataset_path: data/benchmark/0617_generated
video_dir: outputs/0617_pi05/ar
