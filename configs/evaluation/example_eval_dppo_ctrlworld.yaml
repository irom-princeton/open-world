world_model:
  name: ctrlworld
  checkpoint_path: checkpoints/wm/ctrlworld/checkpoint-10000.pt
  params:
    svd_model_path: external/stable-video-diffusion-img2vid
    clip_model_path: external/clip-vit-base-patch32
    debug: false
    debug_log_limit: 3
    num_frames: 5
    num_history: 6
    action_dim: 7
    action_downsample: 1
    width: 320
    height: 192
    num_inference_steps: 50
    decode_to_rgb: true

policy:
  name: dp
  checkpoint_path: path/to/dppo/checkpoint.pt
  params:
    repo_path: external/dsrl/dppo
    config_path: configs/training/your_dataset.yaml
    normalization_path: data/dppo_processed/your_dataset/normalization.npz
    ordered_obs_keys: ["joint_positions", "gripper_position"]
    view_names: ["wrist", "exterior_right"]
    stacked_view_order: [exterior_left, exterior_right, wrist]
    camera_indices: [0, 1]
    device: cuda
    # DPPO policies emit joint velocities; integrate to joint positions via
    # the dynamics adapter, then FK to cartesian for the world model.
    action_adapter_checkpoint_path: checkpoints/action_adapter/model2_15_9.pth
    action_adapter_gripper_max: 1.0
    policy_skip_step: 3
    num_action_steps: 5

reward_model:
  name: dummy
  params: {}

scheduler:
  chunk_size: 5

duration: 20
action_hz: 5
video_dir: outputs/irom_test_carrot_dppo_ctrlworld_videos
dataset_path: data/benchmark/irom_test_carrot
