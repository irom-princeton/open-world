# Policy eval on the 0617_generated benchmark: pi0.5 (pi05_droid) under the
# Ctrl-World base world model (vidwm in flow-matching / 50-step mode).
# All code is in-repo: the vidwm package is vendored at external/vidwm (used via
# params.repo_path default); SVD/CLIP/ctrlworld weights stay external, reached
# through the external/ and checkpoints/ symlinks created by setup_eval_env.sh.
world_model:
  name: vidwm
  # checkpoints/ctrlworld -> Ctrl-World checkpoint dir (symlink; weights external).
  checkpoint_path: checkpoints/ctrlworld/checkpoint-10000.pt
  params:
    # repo_path defaults to external/vidwm (the vendored vidwm package) — implicit.
    svd_model_path: external/stable-video-diffusion-img2vid
    clip_model_path: external/clip-vit-base-patch32
    debug: false
    debug_log_limit: 3
    num_frames: 5
    num_history: 6
    action_dim: 7
    action_downsample: 1
    width: 320
    height: 192
    num_inference_steps: 50          # base Ctrl-World: full 50-step flow matching
    guidance_scale: 2.0
    flow_map_type: flow_matching     # base bidirectional model (not the distilled shortcut)
    decode_to_rgb: true
    action_encoder_type: unaligned
    action_stats_preset: droid
    view_order:
    - exterior_right
    - exterior_left
    - wrist
policy:
  name: openpi
  checkpoint_path: /scratch/gpfs/AM43/yy4041/.cache/openpi/openpi-assets/checkpoints/pi05_droid
  params:
    config_name: pi05_droid
    repo_path: external/openpi
    pytorch_device: cuda
    debug: false
    debug_log_limit: 3
    exterior_view_name: exterior_left
    wrist_view_name: wrist
    stacked_view_order:
    - exterior_right
    - exterior_left
    - wrist
    resize_height: 224
    resize_width: 224
    joint_position_dim: 7
    action_adapter_checkpoint_path: checkpoints/action_adapter/model2_15_9.pth
    action_adapter_gripper_max: 0.75
    intermediate_resize_height: 180
    policy_skip_step: 2
    num_action_steps: 5
reward_model:
  name: dummy
  params: {}
scheduler:
  chunk_size: 5
duration: 25
action_hz: 5
dataset_path: data/benchmark/0617_generated
per_view_videos: true
video_dir: outputs/0617_pi05/ctrlworld
